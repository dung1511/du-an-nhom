[pytest]
DJANGO_SETTINGS_MODULE = quanlykhachsannn.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*

# Coverage settings
addopts = 
    --cov=rooms
    --cov=accounts
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=70

testpaths = 
    rooms/tests
    accounts/tests

# Database settings
# Mark all tests as needing database access by default
markers =
    django_db: mark test as needing database access
    slow: mark test as slow
