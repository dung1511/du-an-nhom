<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Anh Phong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f6f8fb; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .preview-grid img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; border: 1px solid #d6dde8; }
        .drop-zone {
            border: 2px dashed #8fa8c4;
            border-radius: 12px;
            background: #fff;
            padding: 24px;
            text-align: center;
            cursor: pointer;
        }
        .drop-zone.active { border-color: #0d6efd; background: #eef5ff; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="mb-3">Upload Anh Phong (Nhieu Anh)</h4>

            <div class="mb-3">
                <label class="form-label">Chon phong</label>
                <select id="room-select" class="form-select">
                    <option value="">-- Chon phong --</option>
                    {% for room in rooms %}
                        <option value="{{ room.id }}">{{ room.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div id="drop-zone" class="drop-zone mb-3">
                Keo tha nhieu anh vao day hoac bam de chon file (JPG/PNG/WEBP, toi da 2MB/file)
            </div>
            <input id="images-input" type="file" accept="image/jpeg,image/png,image/webp" multiple hidden>

            <div id="preview-grid" class="preview-grid mb-3"></div>

            <div class="progress mb-3" style="height: 22px;">
                <div id="upload-progress" class="progress-bar" role="progressbar" style="width: 0%;">0%</div>
            </div>

            <button id="upload-btn" class="btn btn-primary">Upload</button>
            <a class="btn btn-outline-secondary" href="/admin/">Ve Admin</a>

            <div id="result" class="mt-3"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    const dropZone = document.getElementById('drop-zone');
    const input = document.getElementById('images-input');
    const previewGrid = document.getElementById('preview-grid');
    const progressBar = document.getElementById('upload-progress');
    const uploadBtn = document.getElementById('upload-btn');
    const roomSelect = document.getElementById('room-select');
    const resultEl = document.getElementById('result');

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
    }

    function renderPreview(files) {
        previewGrid.innerHTML = '';
        Array.from(files).forEach((file) => {
            const url = URL.createObjectURL(file);
            const img = document.createElement('img');
            img.src = url;
            img.onload = () => URL.revokeObjectURL(url);
            previewGrid.appendChild(img);
        });
    }

    dropZone.addEventListener('click', () => input.click());
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('active');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('active');
        input.files = e.dataTransfer.files;
        renderPreview(input.files);
    });

    input.addEventListener('change', () => renderPreview(input.files));

    uploadBtn.addEventListener('click', async () => {
        const roomId = roomSelect.value;
        const files = input.files;

        if (!roomId) {
            alert('Vui long chon phong.');
            return;
        }
        if (!files || files.length === 0) {
            alert('Vui long chon it nhat 1 anh.');
            return;
        }

        const formData = new FormData();
        formData.append('room_id', roomId);
        Array.from(files).forEach((file) => formData.append('images', file));

        progressBar.style.width = '0%';
        progressBar.textContent = '0%';
        resultEl.innerHTML = '';

        try {
            const response = await axios.post('/api/admin/rooms/upload-images/', formData, {
                headers: {
                    'X-CSRFToken': getCookie('csrftoken'),
                    'Content-Type': 'multipart/form-data',
                },
                onUploadProgress: (event) => {
                    if (!event.total) return;
                    const percent = Math.round((event.loaded * 100) / event.total);
                    progressBar.style.width = `${percent}%`;
                    progressBar.textContent = `${percent}%`;
                },
            });

            resultEl.innerHTML = `<div class="alert alert-success">${response.data.message}</div>`;
        } catch (error) {
            const message = error?.response?.data?.error || 'Upload that bai.';
            resultEl.innerHTML = `<div class="alert alert-danger">${message}</div>`;
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';
        }
    });
</script>
</body>
</html>
